<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eventloopOS Browser Context Options</title>
    <link rel="stylesheet" href="src/options.css" />
  </head>
  <body>
    <main>
      <h1>eventloopOS</h1>
      <form id="config-form">
        <label for="orchestrator-url">Orchestrator URL</label>
        <div class="row">
          <input id="orchestrator-url" name="orchestratorUrl" type="url" required />
          <button type="submit">Save</button>
        </div>
        <label for="allowed-origins">Allowed origins</label>
        <textarea
          id="allowed-origins"
          name="allowedOrigins"
          rows="5"
          spellcheck="false"
          placeholder="https://github.com&#10;https://*.slack.com"
        ></textarea>
        <div class="hint-grid">
          <label for="task-hint">Task hint</label>
          <input id="task-hint" name="taskHint" type="text" spellcheck="false" placeholder="reading queue or blog launch" />
          <label for="project-hint">Project hint</label>
          <input id="project-hint" name="projectHint" type="text" spellcheck="false" placeholder="optional project" />
        </div>
        <div class="row secondary-row">
          <button id="capture-active-tab" type="button">Capture current tab</button>
          <button id="capture-tab-registry" type="button">Capture tabs</button>
        </div>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="src/options.js"></script>
  </body>
</html>
